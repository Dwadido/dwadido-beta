
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Cache control — prevent stale JS bundles on iPhone Safari -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Dwadido - Connect with Intent</title>
    <meta name="description" content="Dwadido is a platform for verified, intentional connections. Share your unique crush code to connect with someone special." />
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />


    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dwadido.com/" />
    <meta property="og:title" content="Dwadido - Someone wants to connect with you!" />
    <meta property="og:description" content="You've received a Crush Code! Enter it to start a conversation with someone who's interested in connecting with you." />

    <meta property="og:image" content="/og-share.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Dwadido" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://dwadido.com/" />
    <meta name="twitter:title" content="Dwadido - Someone wants to connect with you!" />
    <meta name="twitter:description" content="You've received a Crush Code! Enter it to start a conversation with someone who's interested in connecting with you." />
    <meta name="twitter:image" content="/og-share.png" />


    <!-- WhatsApp specific -->
    <meta property="og:image:alt" content="Dwadido - Connect with Intent" />
    
    <!-- Additional SEO -->
    <meta name="theme-color" content="#D4AF37" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
